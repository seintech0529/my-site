<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Ferret Design</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..800&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <style>
        /* Sidebar Navigation Styles */
        .side-nav {
            position: fixed;
            top: 40px;
            left: 40px;
            z-index: 1000;
        }

        .nav-toggle {
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #fff;
            border: 1px solid #eee;
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        .nav-toggle span {
            display: block;
            width: 20px;
            height: 1px;
            background: #111;
            margin: 3px 0;
            transition: 0.3s;
        }

        .nav-links {
            list-style: none;
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #eee;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            backdrop-filter: blur(10px);
            opacity: 0;
            visibility: hidden;
            transform: translateX(-20px);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .side-nav.active .nav-links {
            opacity: 1;
            visibility: visible;
            transform: translateX(0);
        }

        .side-nav.active .nav-toggle span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .side-nav.active .nav-toggle span:nth-child(2) { opacity: 0; }
        .side-nav.active .nav-toggle span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        .nav-links li {
            margin-bottom: 15px;
        }

        .nav-links li:last-child {
            margin-bottom: 0;
        }

        .nav-links a {
            text-decoration: none;
            color: #666;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            transition: color 0.3s;
            font-family: 'Zen Kaku Gothic New', sans-serif;
        }

        .nav-links a:hover {
            color: #111;
        }

        @media (max-width: 1000px) {
            .side-nav {
                top: 20px;
                left: 20px;
            }
        }

        body {
            padding: 40px 20px;
        }
        .main-content {
            max-width: 900px;
        }
        .contact-form {
            text-align: left;
            width: 100%;
        }
        .form-group {
            margin-bottom: 25px;
        }
        .form-group label {
            display: block;
            font-weight: 700;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }
        .form-group input[type="text"],
        .form-group input[type="email"],
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #eee;
            border-radius: 8px;
            font-family: 'Zen Kaku Gothic New', sans-serif;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <nav class="side-nav">
        <div class="nav-toggle" id="navToggle">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html#concept">Concept</a></li>
            <li><a href="index.html#menu">Menu</a></li>
            <li><a href="index.html#colors">Colors</a></li>
            <li><a href="index.html#delivery">Delivery</a></li>
            <li><a href="index.html#flow">Flow</a></li>
            <li><a href="index.html#notes">Notes</a></li>
            <li><a href="estimate.html">Order</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
    <div class="wrapper fade-in">
        <header class="header">
            <div class="logo-container">
                <img src="logo.jpg" alt="Ferret Design Logo" class="site-logo">
            </div>
            <h1 class="site-title">Contact</h1>
            <p class="subtitle">お問い合わせフォーム</p>
        </header>

        <main class="main-content">
            <div class="section">
                <form id="contactForm" class="contact-form">
                    <div class="form-group">
                        <label>お名前</label>
                        <input type="text" placeholder="例：フェレット 太郎" required>
                    </div>
                    
                    <div class="form-group">
                        <label>メールアドレス</label>
                        <input type="email" placeholder="example@ferretstore.jp" required>
                    </div>

                    <div class="form-group">
                        <label>お問い合わせ種別</label>
                        <select style="width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 8px; font-family: 'Zen Kaku Gothic New', sans-serif;">
                            <option>サービスに関する質問</option>
                            <option>納期のご相談</option>
                            <option>故障・修理について</option>
                            <option>その他</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>お問い合わせ内容</label>
                        <textarea rows="6" placeholder="ご質問やご相談内容を詳しくご記入ください" required></textarea>
                    </div>

                    <button type="submit" class="btn-primary" style="width: 100%; margin-top: 20px;">送信する</button>
                    <a href="index.html" style="display: block; text-align: center; margin-top: 20px; font-size: 0.85rem; color: #999; text-decoration: none;">← ホームに戻る</a>
                </form>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; 2026 Ferret Design.</p>
        </footer>
    </div>

    <script>
        document.getElementById('contactForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const newData = {
                type: 'Contact',
                date: new Date().toISOString(),
                name: document.querySelector('input[type="text"]').value,
                email: document.querySelector('input[type="email"]').value,
                message: document.querySelector('textarea').value,
                total: null
            };

            const existingData = JSON.parse(localStorage.getItem('ferretStoreData') || '[]');
            existingData.push(newData);
            localStorage.setItem('ferretStoreData', JSON.stringify(existingData));

            alert('お問い合わせが送信されました（デモ）。管理者ページで内容を確認できます。');
            e.target.reset();
        });

        // Navigation Toggle
        const navToggle = document.getElementById('navToggle');
        const sideNav = document.querySelector('.side-nav');
        const navLinks = document.querySelectorAll('.nav-links a');

        navToggle.addEventListener('click', () => {
            sideNav.classList.toggle('active');
        });

        navLinks.forEach(link => {
            link.addEventListener('click', () => {
                sideNav.classList.remove('active');
            });
        });
    </script>
</body>
</html>
