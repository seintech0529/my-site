<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Ferret Design</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #f8f9fa;
            padding: 20px;
        }
        .admin-container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding: 20px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .admin-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #111;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #111;
            margin-bottom: 5px;
        }
        .stat-label {
            font-size: 0.8rem;
            color: #999;
            text-transform: uppercase;
        }
        .data-table-container {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            overflow-x: auto;
        }
        .table-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        th {
            text-align: left;
            padding: 12px;
            color: #999;
            font-weight: 500;
            border-bottom: 2px solid #f5f5f5;
        }
        td {
            padding: 15px 12px;
            border-bottom: 1px solid #f5f5f5;
            vertical-align: top;
        }
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .badge-order { background: #e3f2fd; color: #1976d2; }
        .badge-contact { background: #f1f8e9; color: #388e3c; }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #ccc;
        }
    </style>
</head>
<body>
    <div class="admin-container fade-in">
        <header class="admin-header">
            <div class="admin-title">Ferret Design Admin</div>
            <button onclick="clearData()" style="font-size: 0.8rem; color: #ff5252; background: none; border: 1px solid #ff5252; padding: 5px 10px; border-radius: 4px; cursor: pointer;">データを全削除</button>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalCount">0</div>
                <div class="stat-label">総件数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="orderCount">0</div>
                <div class="stat-label">見積もり・注文</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="contactCount">0</div>
                <div class="stat-label">お問い合わせ</div>
            </div>
        </div>

        <div class="data-table-container">
            <div class="table-title">受信トレイ</div>
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>日時</th>
                        <th>種別</th>
                        <th>お名前</th>
                        <th>メール / 内容</th>
                        <th>金額 (概算)</th>
                    </tr>
                </thead>
                <tbody id="dataBody">
                    <!-- Data will be loaded here -->
                </tbody>
            </table>
            <div id="emptyState" class="empty-state">まだデータがありません</div>
        </div>
    </div>

    <script>
        function loadData() {
            const data = JSON.parse(localStorage.getItem('ferretStoreData') || '[]');
            const body = document.getElementById('dataBody');
            const emptyState = document.getElementById('emptyState');
            
            body.innerHTML = '';
            
            if (data.length === 0) {
                emptyState.style.display = 'block';
            } else {
                emptyState.style.display = 'none';
                data.sort((a, b) => new Date(b.date) - new Date(a.date));
                
                data.forEach(item => {
                    const tr = document.createElement('tr');
                    const isOrder = item.type === 'Order';
                    tr.innerHTML = `
                        <td style="white-space: nowrap;">${new Date(item.date).toLocaleString()}</td>
                        <td><span class="badge ${isOrder ? 'badge-order' : 'badge-contact'}">${isOrder ? '見積もり' : '問い合わ'}</span></td>
                        <td style="font-weight: 500;">${item.name}</td>
                        <td>
                            <div style="color: #666; margin-bottom: 5px;">${item.email}</div>
                            <div style="font-size: 0.85rem; line-height: 1.4;">${item.message}</div>
                            ${item.options ? `<div style="font-size: 0.75rem; color: #999; margin-top: 5px;">オプション: ${item.options}</div>` : ''}
                        </td>
                        <td style="font-weight: 700;">${item.total || '-'}</td>
                    `;
                    body.appendChild(tr);
                });
            }

            // Stats
            document.getElementById('totalCount').textContent = data.length;
            document.getElementById('orderCount').textContent = data.filter(i => i.type === 'Order').length;
            document.getElementById('contactCount').textContent = data.filter(i => i.type === 'Contact').length;
        }

        function clearData() {
            if(confirm('全てのデータを削除してもよろしいですか？')) {
                localStorage.removeItem('ferretStoreData');
                loadData();
            }
        }

        loadData();
        // Refresh every 5 seconds if someone submits while open
        setInterval(loadData, 5000);
    </script>
</body>
</html>
